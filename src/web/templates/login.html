<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDS Secure Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #080a14;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 30px;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid #334155;
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        }
        .form-control {
            background: transparent;
            border: 1px solid #4f46e5;
            color: #e2e8f0;
        }
        .form-control:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 0.2rem rgba(139, 92, 246, 0.25);
        }
        .neon-btn {
            background: #7c3aed;
            border: none;
            color: white;
        }
        .neon-btn:hover {
            background: #8b5cf6;
        }
        .login-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .shield-icon {
            font-size: 42px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="shield-icon">🛡️</div>
            <h2>IDS SECURE</h2>
            <p class="text-muted">Veuillez vous connecter pour accéder à cette page</p>
        </div>

        {% if error %}
            <div class="alert alert-danger" role="alert">
                {{ error }}
            </div>
        {% endif %}

        <form method="post" action="/login">
            <div class="mb-3">
                <label for="username" class="form-label">Utilisateur</label>
                <input type="text" class="form-control" id="username" name="username" value="admin" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Mot de passe</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn neon-btn w-100">Se Connecter</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
